name: run-static-checks
run-name: Checking '#${{github.event.number}}' on branch '${{github.head_ref}}'
on: pull_request

permissions: {}

jobs:
  static-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # Required to comment on PR with check results

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false

      - name: Setup node
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 #v6.0.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run typechecker
        # Run type check even if the previous linter step failed
        if: success() || failure()
        run: npm run typeCheck

      - name: Run tests
        # Run test even if the previous step(s) failed
        if: success() || failure()
        run: npx vitest run --coverage

      - name: Vitest coverage report
        uses: davelosert/vitest-coverage-report-action@123077f0e59cbc2e9afd2c454dbc14ae36737874 #v2.1.1

  static-workflow-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false

      # Run zizmor for static workflow analysis
      - name: Run zizmor 🌈
        uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3

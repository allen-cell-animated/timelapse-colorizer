# Adapted from https://github.com/marketplace/actions/deploy-pr-preview and
# https://github.com/sitek94/vite-deploy-demo
name: Deploy GH Pages Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency: pages-build-deployment-${{ github.ref }}
permissions: {}

jobs:
  pages-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false

      - name: Setup node
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 #v6.0.0
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false # Do not cache when publishing to prevent cache pollution attacks

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx vite build --base=/timelapse-colorizer/

      - name: Upload build files
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b #v4.5.0
        with:
          name: production-files
          path: ./dist

  pages-deploy:
    needs: pages-build
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for pushing to gh-pages branch

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false

      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
        with:
          name: production-files
          path: ./dist

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f #v4.8.0
        with:
          folder: ./dist
          # Leave existing PR preview deployments in place
          clean-exclude: |
            pr-preview/
            pr-preview-internal/
          branch: gh-pages
